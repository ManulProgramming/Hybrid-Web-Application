<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base.html}">
<head>
    <title></title>
    <style>
        .video-card {
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .video-card:hover {
            transform: scale(1.02);
        }

        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 12px;
        }

        .channel-avatar img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .video-meta {
            margin-left: 10px;
            display: flex;
            flex-direction: column;
        }

        .video-title {
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .channel-name {
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .video-date {
            font-size: 0.8rem;
        }

        .thumbnail-link {
            overflow: hidden;
            display: block;
            border-radius: 12px;
        }

        .thumbnail-link img {
            transition: transform 0.2s ease;
        }

        .thumbnail-link:hover img {
            transform: scale(1.05);
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            z-index: 2;
            color: var(--bs-secondary-color);
        }
        #avatarImage {
            width: 200px;
            height: 200px;
            border-radius: 50%;
        }
        .image-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .image-wrapper img {
            object-fit: cover;
            transition: opacity 0.3s ease;
        }
        .overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay i {
            color: white;
            font-size: 2rem;
        }

        .image-wrapper:hover .overlay {
            opacity: 1;
        }

        @media (min-width: 1700px) {
            .container {
                max-width: 1600px;
            }
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div id="react-profile" class="card shadow-sm container mt-3">
        <div class="card-body container" style="pointer-events: none;">
            <div class="row g-4 align-items-center">
                <div class="col-12 col-md-4 text-center d-flex justify-content-center">
                    <div class="mt-2 mt-md-0 bg-body-secondary rounded-circle" style="width:200px; height:200px; border-radius: 50%;">

                    </div>
                </div>
                <div class="col-12 col-md-8 text-center">
                    <div class="mb-3 text-start">
                        <div class="mt-0 mb-2 bg-body-secondary rounded" style="width:100%; height:36px">

                        </div>
                        <div class="mt-0 mb-2 bg-body-secondary rounded" style="width:100%; height:36px">

                        </div>
                    </div>
                    <div class="mb-3 text-start">
                        <div class="mt-0 mb-2 bg-body-secondary rounded" style="width:100%; height:36px">

                        </div>
                        <div class="mt-0 mb-2 bg-body-secondary rounded" style="width:100%; height:36px">

                        </div>
                    </div>
                    <div class="mb-3 text-start">
                        <div class="mt-0 mb-2 bg-body-secondary rounded" style="width:100%; height:36px">

                        </div>
                        <div class="mt-0 bg-body-secondary rounded" style="width:100%; height:36px">

                        </div>
                    </div>
                    <div class="row mx-3 justify-content-center gap-3 gap-md-5">
                        <div class="col-12 col-md-3 bg-body-secondary rounded" style="height: 38px"></div>
                        <div class="col-12 col-md-3 bg-body-secondary rounded" style="height: 38px"></div>
                        <div class="col-12 col-md-3 bg-body-secondary rounded" style="height: 38px"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="react-profile-videos" class="container mt-4">
        <div class="d-flex justify-content-center">
            <div class="spinner-border text-primary" role="status">
            </div>
        </div>
    </div>
    <script type="module" src="http://localhost:5173/src/profile.jsx"></script>
</div>

<script th:inline="javascript" layout:fragment="script">

    const currentUserId = /*[[${res.currentUser!=null ? res.currentUser.id : 0}]]*/ 0;
</script>

</body>
</html>
