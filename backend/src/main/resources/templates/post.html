<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base.html}">
<head>
    <title></title>
    <style>
        .image-wrapper {
            position: relative;
            display: inline-block;
        }

        .image-wrapper img {
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay p {
            color: white;
            font-size: 2rem;
        }

        .image-wrapper:hover .overlay {
            opacity: 1;
        }

        .image-wrapper:hover .custom-overlay {
            opacity: 0;
        }

        .description-wrapper {
            position: relative;
            max-height: 4.5em;
            overflow: hidden;
            cursor: pointer;
        }

        .description-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2em;
            background: linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0),
                    var(--bs-body-bg)
            );
        }

        .description-wrapper.expanded {
            max-height: none;
        }

        .description-wrapper.expanded::after {
            display: none;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div th:if="${res.content}">
        <div class="container mt-4">

            <div class="embed-responsive embed-responsive-16by9 ratio ratio-16x9">
                <video controls>
                    <source th:src="@{/media/p/{postId}(postId=${res.params.postId})}" type="video/mp4"
                            onerror="(()=>{this.src=''; document.getElementById('imgWrapper').classList.remove('d-none'); this.parentElement.parentElement.remove();})()">
                </video>
            </div>
            <div id="imgWrapper" class="d-none image-wrapper embed-responsive embed-responsive-16by9 ratio ratio-16x9">
                <img src="/video_placeholder.jpg">
                <div class="overlay">
                    <p>Loading...</p>
                </div>
            </div>

            <div id="react-video">

                <div id="react-video-info">
                    <div class="mt-0 mb-2 bg-body-secondary rounded" style="width:100%; height:36px">

                    </div>
                    <div class="row d-flex">
                        <div class="col-auto">
                            <div class="bg-body-secondary rounded-circle" style="width:50px; height:50px;">

                            </div>
                        </div>
                        <div class="col">
                            <div class="mt-0 mb-2 bg-body-secondary rounded" style="width:100%; height:36px">

                            </div>
                            <div class="mt-0 mb-2 bg-body-secondary rounded" style="width:100%; height:36px">

                            </div>
                        </div>
                        <div class="col-auto" style="width: 150px">
                            <div class="row-auto d-flex mb-2" style="">
                                <div class="bg-body-secondary rounded col-auto" style="width: 100%; height: 36px"></div>
                            </div>
                            <div class="bg-body-secondary rounded row-auto" style="height: 36px"></div>
                        </div>
                    </div>
                </div>

                <hr class="mt-3 bg-body border-2 border-top"/>

                <div id="react-video-comments">
                    <div class="d-flex justify-content-center">
                        <div class="spinner-border text-primary" role="status">
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div th:unless="${res.content}">
            <div class="text-center">
                <h1 class="display-1 fw-bold">404</h1>
                <p class="fs-2 fw-medium mt-4">Oops! Content not found</p>
                <a href="/" class="btn btn-light fw-semibold rounded-pill px-4 py-2 custom-btn">
                    Go Home
                </a>
            </div>
        </div>
        <script type="module" src="/assets/post.js"></script>
    </div>

    <script th:inline="javascript" layout:fragment="script">
        const postId = /*[[${res.params.postId}]]*/ -1;
        const currentUserId = /*[[${res.currentUser!=null ? res.currentUser.id : 0}]]*/ 0;
    </script>

</body>
</html>
